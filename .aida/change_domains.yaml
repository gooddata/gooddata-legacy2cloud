# AIDA change domain classification
#
# Define how changed paths map to validation domains.
# See `.aida/validation_policy.yaml` for mapping domains to pipelines.
domains:
  - id: python
    description: Python source files and configuration
    match_globs:
      - "**/*.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
